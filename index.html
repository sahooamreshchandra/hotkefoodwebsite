<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Primary SEO -->
  <title>hotkefood — Healthy School Meals Delivered Fresh Daily</title>
  <meta name="description"
    content="hotkefood delivers fresh, nutritious, chef-prepared school lunches to your child's classroom daily. Balanced meals with rice, dal, sabzi, roti and fruits — ordered easily via our mobile app." />
  <meta name="keywords"
    content="school meal delivery, school lunch, kids tiffin box, healthy school food, hotkefood, school meal plan, children nutrition, tiffin delivery school, FSSAI certified food, school canteen India" />
  <meta name="author" content="hotkefood" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://hotkefood.com/" />

  <!-- Geo targeting -->
  <meta name="geo.region" content="IN" />
  <meta name="geo.placename" content="India" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hotkefood.com/" />
  <meta property="og:title" content="hotkefood — Healthy School Meals Delivered Fresh Daily" />
  <meta property="og:description"
    content="Fresh, balanced, chef-prepared school lunches delivered to your child's classroom every day. Easy ordering via mobile app. FSSAI certified kitchen." />
  <meta property="og:image" content="/favicon.png" />
  <meta property="og:site_name" content="hotkefood" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@hotkefood" />
  <meta name="twitter:title" content="hotkefood — Healthy School Meals Delivered" />
  <meta name="twitter:description"
    content="Fresh, balanced school lunches delivered to your child's classroom every day." />
  <meta name="twitter:image" content="/favicon.png" />

  <!-- Structured Data: LocalBusiness / FoodService -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FoodService",
    "name": "hotkefood",
    "description": "hotkefood delivers fresh, nutritious, chef-prepared school lunches to children's classrooms daily. Balanced meals ordered via mobile app.",
    "url": "https://hotkefood.com",
    "logo": "https://hotkefood.com/favicon.png",
    "telephone": "+917008401800",
    "email": "hotkefood@gmail.com",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "IN"
    },
    "servesCuisine": "Indian",
    "priceRange": "₹₹",
    "openingHours": "Mo-Sa 09:00-18:00",
    "sameAs": [
      "https://twitter.com/hotkefood"
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
